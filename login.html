<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - MHO Music Academy</title>
    <link rel="icon" type="image/png" href="Logo MHO Academy.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <link rel="stylesheet" href="mobile.css?v=20260701-custom-group-picker">
    <link rel="stylesheet" href="glass-theme.css?v=20260602-cache-fix">
    <link rel="stylesheet" href="public-glass-pages.css?v=20260616-glass-transparency">
    <script src="i18n.js?v=20260603-bilingual-membership"></script>
    <script src="firebase-shared.js?v=20260602-teacher-allowlist"></script>
</head>
<body class="public-glass-page login-page min-h-screen">
    <!-- Navigation -->
    <nav class="public-glass-nav text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="login-brand text-lg font-bold">🎵 MHO Music Academy</a>
                </div>
                <div class="hidden md:flex space-x-4">
                    <a href="index.html" class="public-nav-link px-4 py-2 rounded-full transition" data-i18n="nav-home">Acasă</a>
                    <a href="noutati.html" class="public-nav-link px-4 py-2 rounded-full transition" data-i18n="nav-news">Noutăți</a>
                    <a href="register.html" class="public-nav-link px-4 py-2 rounded-full transition" data-i18n="nav-register">Înregistrare</a>
                    <a href="exam.html" class="public-nav-link px-4 py-2 rounded-full transition" data-i18n="nav-exam">Examen</a>
                    <a href="galerie.html" class="public-nav-link px-4 py-2 rounded-full transition" data-i18n="nav-gallery">Galerie</a>
                    <a href="admin.html" class="public-nav-link px-4 py-2 rounded-full transition hidden" data-admin-link="true" data-i18n="nav-admin">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="public-page-shell min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <div class="public-glass-panel login-panel rounded-[2rem] p-8 md:p-10">
                <div class="text-center mb-8">
                    <div class="public-cta w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <h2 class="login-mobile-title text-3xl font-bold text-gray-800 mb-2" data-i18n="auth-login-title">Autentificare</h2>
                    <p class="login-mobile-copy text-gray-600" data-i18n="auth-login-desc">Conectează-te la contul tău</p>
                </div>

                <!-- Status Message -->
                <div id="statusMessage" class="hidden mb-6 p-4 rounded-lg text-center font-medium"></div>

                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label-email">
                            Email *
                        </label>
                        <input 
                            type="email" 
                            id="email"
                            required
                            autofocus
                            placeholder="Introduceți adresa de email"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent"
                            data-i18n="placeholder-email"
                        >
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label-password">
                            Parolă *
                        </label>
                        <input 
                            type="password" 
                            id="password"
                            required
                            placeholder="Introduceți parola"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent"
                            data-i18n="placeholder-password"
                        >
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input 
                                id="rememberMe" 
                                type="checkbox" 
                                class="h-4 w-4 text-amber-600 focus:ring-amber-500 border-gray-300 rounded"
                            >
                            <label for="rememberMe" class="ml-2 block text-sm text-gray-700" data-i18n="label-remember-me">
                                Ține-mă minte
                            </label>
                        </div>
                        <a href="#" id="forgotPasswordLink" class="text-sm text-amber-600 hover:text-amber-800" data-i18n="label-forgot-password">
                            Ai uitat parola?
                        </a>
                    </div>

                    <button 
                        type="submit"
                        class="public-cta w-full text-white py-3 rounded-2xl font-semibold text-lg transition shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span id="loginBtnText" data-i18n="btn-login">Autentifică-te</span>
                    </button>

                    <!-- Divider -->
                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-transparent text-gray-500" data-i18n="divider-or">sau</span>
                        </div>
                    </div>

                    <!-- Social Sign-In Buttons -->
                    <button 
                        type="button"
                        id="googleSignInBtn"
                        class="public-secondary-btn w-full flex items-center justify-center gap-3 text-gray-700 py-3 rounded-2xl font-semibold transition shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span id="googleSignInBtnText" data-i18n="btn-google">Continuă cu Google</span>
                    </button>

                    <div class="text-center">
                        <p class="text-gray-600">
                            <span data-i18n="redirect-no-account">Nu ai cont?</span>
                            <a href="signup.html" class="text-amber-600 hover:text-amber-800 font-semibold" data-i18n="nav-register">
                                Înregistrează-te
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
        <div class="public-glass-modal rounded-[2rem] p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <div class="public-cta w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2" data-i18n="modal-reset-title">Resetare Parolă</h3>
                <p class="text-gray-600" data-i18n="modal-reset-desc">Introduceți adresa de email și vă vom trimite un link pentru resetarea parolei</p>
            </div>

            <!-- Modal Status Message -->
            <div id="modalStatusMessage" class="hidden mb-6 p-4 rounded-lg text-center font-medium"></div>

            <form id="forgotPasswordForm" class="space-y-6">
                <div>
                    <label for="resetEmail" class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label-email">
                        Adresă Email *
                    </label>
                    <input 
                        type="email" 
                        id="resetEmail"
                        required
                        autofocus
                        placeholder="Introduceți adresa de email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent"
                        data-i18n="placeholder-email"
                    >
                </div>

                <div class="flex space-x-4">
                    <button 
                        type="button"
                        id="cancelResetBtn"
                        class="public-secondary-btn flex-1 py-3 rounded-2xl font-semibold transition"
                        data-i18n="btn-cancel"
                    >
                        Anulează
                    </button>
                    <button 
                        type="submit"
                        class="public-cta flex-1 text-white py-3 rounded-2xl font-semibold transition shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span id="resetBtnText" data-i18n="btn-send-email">Trimite Email</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script>
        window.FirebaseSharedReady.then(async ({ app, ensureUserProfile }) => {
            const {
                getAuth,
                signInWithEmailAndPassword,
                sendPasswordResetEmail,
                onAuthStateChanged,
                signInWithPopup,
                GoogleAuthProvider
            } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');

            const auth = getAuth(app);
            const requestedRedirect = new URLSearchParams(window.location.search).get('redirect') || '';
            const googleProvider = new GoogleAuthProvider();
            let manualRedirectInProgress = false;

            function safeRedirectTarget(value) {
                if (!value) return '';
                if (/^https?:\/\//i.test(value) || value.includes('//')) return '';
                const clean = value.replace(/^\/+/, '');
                if (!clean || clean.includes('..') || clean.includes(':')) return '';
                return clean || '';
            }

            async function resolveRedirectTarget() {
                const explicitRedirect = safeRedirectTarget(requestedRedirect);
                if (explicitRedirect) return explicitRedirect;
                return 'dashboard.html';
            }

            async function redirectAuthenticatedUser(user) {
                manualRedirectInProgress = true;
                window.location.href = await resolveRedirectTarget(user);
            }

            onAuthStateChanged(auth, (user) => {
                if (user && !manualRedirectInProgress) redirectAuthenticatedUser(user);
            });

            const loginForm = document.getElementById('loginForm');
            const statusMessage = document.getElementById('statusMessage');
            const loginBtnText = document.getElementById('loginBtnText');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const forgotPasswordModal = document.getElementById('forgotPasswordModal');
            const forgotPasswordForm = document.getElementById('forgotPasswordForm');
            const cancelResetBtn = document.getElementById('cancelResetBtn');
            const resetEmail = document.getElementById('resetEmail');
            const modalStatusMessage = document.getElementById('modalStatusMessage');
            const resetBtnText = document.getElementById('resetBtnText');
            const googleSignInBtn = document.getElementById('googleSignInBtn');
            const googleSignInBtnText = document.getElementById('googleSignInBtnText');

            function showStatus(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = `mb-6 p-4 rounded-lg text-center font-medium ${
                    type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' :
                    type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' :
                    'bg-blue-100 text-blue-700 border border-blue-300'
                }`;
                statusMessage.classList.remove('hidden');
            }

            function hideStatus() {
                statusMessage.classList.add('hidden');
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideStatus();

                const submitBtn = loginForm.querySelector('button[type="submit"]');
                const originalBtnText = loginBtnText.textContent;
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showStatus(window.i18n.t('error-fill-fields'), 'error');
                    return;
                }

                submitBtn.disabled = true;
                loginBtnText.textContent = window.i18n.t('status-connecting');

                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    showStatus(window.i18n.t('status-login-success'), 'success');
                } catch (error) {
                    console.error('Login error:', error);
                    let errorMessage = window.i18n.t('error-auth-failed');

                    switch (error.code) {
                        case 'auth/user-not-found':
                            errorMessage = window.i18n.t('error-user-not-found');
                            break;
                        case 'auth/wrong-password':
                            errorMessage = window.i18n.t('error-wrong-password');
                            break;
                        case 'auth/invalid-credential':
                        case 'auth/invalid-login-credentials':
                            errorMessage = window.i18n.t('error-invalid-credential') || '❌ Emailul sau parola nu sunt corecte. Verifică datele sau folosește „Ai uitat parola?”.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage = window.i18n.t('error-invalid-email');
                            break;
                        case 'auth/user-disabled':
                            errorMessage = window.i18n.t('error-user-disabled');
                            break;
                        case 'auth/too-many-requests':
                            errorMessage = window.i18n.t('error-too-many-requests');
                            break;
                        default:
                            errorMessage = `❌ ${error.message}`;
                    }

                    showStatus(errorMessage, 'error');
                } finally {
                    submitBtn.disabled = false;
                    loginBtnText.textContent = originalBtnText;
                }
            });

            function showModalStatus(message, type) {
                modalStatusMessage.textContent = message;
                modalStatusMessage.className = `mb-6 p-4 rounded-lg text-center font-medium ${
                    type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' :
                    type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' :
                    'bg-blue-100 text-blue-700 border border-blue-300'
                }`;
                modalStatusMessage.classList.remove('hidden');
            }

            function hideModalStatus() {
                modalStatusMessage.classList.add('hidden');
            }

            forgotPasswordLink.addEventListener('click', (e) => {
                e.preventDefault();
                const loginEmail = document.getElementById('email').value.trim();
                if (loginEmail) {
                    resetEmail.value = loginEmail;
                }
                forgotPasswordModal.classList.remove('hidden');
                resetEmail.focus();
            });

            cancelResetBtn.addEventListener('click', () => {
                forgotPasswordModal.classList.add('hidden');
                forgotPasswordForm.reset();
                hideModalStatus();
            });

            forgotPasswordModal.addEventListener('click', (e) => {
                if (e.target === forgotPasswordModal) {
                    forgotPasswordModal.classList.add('hidden');
                    forgotPasswordForm.reset();
                    hideModalStatus();
                }
            });

            forgotPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideModalStatus();

                const submitBtn = forgotPasswordForm.querySelector('button[type="submit"]');
                const originalBtnText = resetBtnText.textContent;
                const email = resetEmail.value.trim();

                if (!email) {
                    showModalStatus(window.i18n.t('error-email-required'), 'error');
                    resetEmail.focus();
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showModalStatus(window.i18n.t('error-invalid-email'), 'error');
                    resetEmail.focus();
                    return;
                }

                submitBtn.disabled = true;
                resetBtnText.textContent = window.i18n.t('status-sending');

                try {
                    await sendPasswordResetEmail(auth, email);

                    showModalStatus(window.i18n.t('status-reset-link-sent'), 'success');

                    setTimeout(() => {
                        forgotPasswordModal.classList.add('hidden');
                        forgotPasswordForm.reset();
                        hideModalStatus();
                    }, 3000);
                } catch (error) {
                    console.error('Password reset error:', error);
                    let errorMessage = window.i18n.t('error-reset-email-failed');

                    switch (error.code) {
                        case 'auth/user-not-found':
                            errorMessage = window.i18n.t('error-user-not-found');
                            break;
                        case 'auth/invalid-email':
                            errorMessage = window.i18n.t('error-invalid-email');
                            break;
                        case 'auth/too-many-requests':
                            errorMessage = window.i18n.t('error-too-many-requests');
                            break;
                        case 'auth/invalid-continue-uri':
                        case 'auth/unauthorized-continue-uri':
                            errorMessage = window.i18n.t('error-invalid-reset-domain') || '❌ Domeniul pentru resetarea parolei nu este autorizat in Firebase.';
                            break;
                        default:
                            errorMessage = `❌ ${error.message || 'Eroare necunoscută. Te rugăm să încerci din nou.'}`;
                    }

                    showModalStatus(errorMessage, 'error');
                } finally {
                    submitBtn.disabled = false;
                    resetBtnText.textContent = originalBtnText;
                }
            });

            async function saveUserToFirestore(user) {
                try {
                    await ensureUserProfile(user, {
                        name: user.displayName || user.email?.split('@')[0] || 'User',
                        photoURL: user.photoURL || null,
                        provider: user.providerData[0]?.providerId || 'unknown'
                    });
                } catch (error) {
                    console.error('Error saving user to Firestore:', error);
                }
            }

            googleSignInBtn.addEventListener('click', async () => {
                hideStatus();
                googleSignInBtn.disabled = true;
                const originalText = googleSignInBtnText.textContent;
                googleSignInBtnText.textContent = window.i18n.t('status-connecting');

                try {
                    const result = await signInWithPopup(auth, googleProvider);
                    const user = result.user;
                    await saveUserToFirestore(user);
                    showStatus(window.i18n.t('status-login-success'), 'success');
                    await redirectAuthenticatedUser(user);
                } catch (error) {
                    console.error('Google sign-in error:', error);
                    let errorMessage = window.i18n.t('error-google-auth-failed');

                    switch (error.code) {
                        case 'auth/popup-closed-by-user':
                            errorMessage = window.i18n.t('error-popup-closed');
                            break;
                        case 'auth/popup-blocked':
                            errorMessage = window.i18n.t('error-popup-blocked');
                            break;
                        case 'auth/cancelled-popup-request':
                            errorMessage = window.i18n.t('error-auth-cancelled');
                            break;
                        default:
                            errorMessage = `❌ ${error.message || 'Eroare necunoscută.'}`;
                    }

                    showStatus(errorMessage, 'error');
                } finally {
                    googleSignInBtn.disabled = false;
                    googleSignInBtnText.textContent = originalText;
                }
            });
        }).catch((error) => {
            console.error('Firebase bootstrap failed on login page:', error);
            const statusMessage = document.getElementById('statusMessage');
            if (statusMessage) {
                statusMessage.textContent = 'Nu s-a putut inițializa autentificarea. Deschide pagina printr-un server local sau reîncarcă pagina.';
                statusMessage.className = 'mb-6 p-4 rounded-lg text-center font-medium bg-red-100 text-red-700 border border-red-300';
                statusMessage.classList.remove('hidden');
            }
        });
    </script>
    <script src="posthog-analytics.js?v=20260530-posthog"></script>
    <script src="mobile-menu.js?v=20260616-home-redirect"></script>
    <script src="public-auth.js?v=20260602-teacher-allowlist"></script>
</body>
</html>
